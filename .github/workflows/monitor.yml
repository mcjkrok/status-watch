name: monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # co 30 minut
  workflow_dispatch: {}       # + ręczne uruchomienie z zakładki Actions

permissions:
  contents: write

# Kolejne uruchomienia nie mogą się nakładać (konflikt przy pushu historii)
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checks and render status page
        id: checks
        run: python monitor.py

      - name: Commit history and status page
        # always() — wyniki zapisujemy także wtedy, gdy któryś serwis leży
        # (monitor.py kończy się wtedy kodem 1, żeby run był czerwony)
        if: always() && steps.checks.outcome != 'skipped'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json docs/index.html
          git diff --cached --quiet || git commit -m "chore: update status data [skip ci]"
          git push
